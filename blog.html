:root{--bg:#08090d;--s1:#10131c;--s2:#161b28;--bd:#232a3d;--acc:#7c5cfc;--acc2:#a78bfa;--gr:#00d2a0;--tx:#e2e8f0;--mt:#8a93a6;--wh:#fff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Vazirmatn',sans-serif;line-height:1.9;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(124,92,252,.15),transparent 60%),radial-gradient(ellipse at 85% 30%,rgba(0,210,160,.1),transparent 60%);pointer-events:none;z-index:0;}
.wrap{max-width:820px;margin:0 auto;padding:24px 20px 60px;position:relative;z-index:1;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;color:var(--wh);text-decoration:none;}
.logo-ic{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:block;object-fit:cover;}
.nav-cta{display:flex;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none;border:1px solid transparent;}
.btn-p{background:linear-gradient(135deg,var(--acc),#5b21b6);color:#fff;}
.btn-g{background:var(--s2);border-color:var(--bd);color:var(--tx);}
h1.pg{font-size:clamp(24px,4.5vw,34px);font-weight:900;color:var(--wh);margin-bottom:8px;}
.sub{color:var(--mt);font-size:14px;margin-bottom:34px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.post-card{display:block;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:20px;text-decoration:none;color:inherit;transition:border-color .2s,transform .2s;}
.post-card:hover{border-color:var(--acc);transform:translateY(-2px);}
.post-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;flex-shrink:0;}
.post-title{font-size:15px;font-weight:800;color:var(--wh);margin-bottom:6px;}
.post-excerpt{font-size:12.5px;color:var(--mt);margin-bottom:10px;}
.post-date{font-size:11px;color:var(--acc2);}
.empty{text-align:center;padding:60px 20px;color:var(--mt);}
.empty .ic{font-size:40px;margin-bottom:12px;}
/* Post detail */
.post-detail{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:30px 26px;}
.post-detail .hd-icon{width:60px;height:60px;border-radius:15px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.post-detail h1{font-size:clamp(22px,4vw,30px);font-weight:900;color:var(--wh);margin-bottom:10px;}
.post-detail .meta{font-size:12px;color:var(--acc2);margin-bottom:22px;}
.post-body{font-size:15px;color:var(--tx);}
.post-body p{margin-bottom:14px;}
.post-body h2{font-size:19px;font-weight:800;color:var(--wh);margin:22px 0 10px;}
.post-body h3{font-size:16px;font-weight:800;color:var(--wh);margin:18px 0 8px;}
.post-body ul,.post-body ol{margin:0 0 14px 0;padding-inline-start:22px;}
.post-body a{color:var(--acc2);}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--acc2);text-decoration:none;font-size:13px;font-weight:700;margin-bottom:20px;}
.cta-band{text-align:center;background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(0,210,160,.1));border:1px solid rgba(124,92,252,.25);border-radius:16px;padding:30px 20px;margin-top:30px;}
@keyframes giftWiggle{0%,100%{transform:rotate(0deg) translateY(0);}20%{transform:rotate(-12deg) translateY(-6px);}40%{transform:rotate(9deg) translateY(0);}60%{transform:rotate(-7deg) translateY(-4px);}80%{transform:rotate(5deg) translateY(0);}}
.gift-emoji{display:inline-block;animation:giftWiggle 1.6s ease-in-out infinite;}
footer{border-top:1px solid var(--bd);margin-top:50px;padding-top:22px;text-align:center;color:var(--mt);font-size:12px;}
footer a{color:var(--acc2);text-decoration:none;}
@media(max-width:560px){.grid{grid-template-columns:1fr;}}
</style>

<script>
// Public read-only page — still needs the shared key to pass db.js's auth
// gate (it rejects every /api/db request, GET included, without it). Without
// this, the fetch below 401s and the page silently falls back to an empty
// post list for anyone visiting without cached localStorage from admin.html.
var DB_CLIENT_KEY='18cc92b1c20ab7712fb4e1af98f08aea5962cd4e4b496955d7606891c68231c8';
(function(){
  var _fetch=window.fetch;
  window.fetch=function(url,opts){
    if(typeof url==='string' && url.indexOf('/api/db')===0){
      opts=opts||{};
      opts.headers=Object.assign({},opts.headers||{},{'x-db-key':DB_CLIENT_KEY});
    }
    return _fetch(url,opts);
  };
})();

// ── Referral visit tracking: if this page was opened via someone's
// referral link (?ref=CODE), record one deduped visit server-side so the
// "invite 100 → 50 confirmed visits" Free Likes path can credit them.
(function(){
  try{
    var ref=new URLSearchParams(location.search).get('ref');
    if(!ref) return;
    ref=ref.trim().toUpperCase();
    if(!ref) return;
    var VID_KEY='smm_visitor_id';
    var vid=localStorage.getItem(VID_KEY);
    if(!vid){
      vid='v'+Date.now().toString(36)+Math.random().toString(36).slice(2,10);
      localStorage.setItem(VID_KEY,vid);
    }
    var DEDUPE_KEY='smm_ref_tracked_'+ref;
    if(localStorage.getItem(DEDUPE_KEY)) return;
    localStorage.setItem(DEDUPE_KEY,'1');
    fetch('/api/db',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'track_ref_visit',ref:ref,vid:vid})
    }).catch(function(){});
  }catch(e){}
})();

function escHtml(s){var d=document.createElement('div');d.textContent=String(s==null?'':s);return d.innerHTML;}

var PLATFORM_COLORS={
  instagram:'linear-gradient(135deg,#f09433,#dc2743,#bc1888)',
  tiktok:'#010101',telegram:'#2AABEE',youtube:'#FF0000',
  facebook:'#1877F2',other:'linear-gradient(135deg,#7c5cfc,#00d2a0)'
};
var PLATFORM_KEYWORDS={
  instagram:['اینستاگرام','instagram','ریلز','اکسپلور'],
  tiktok:['تیک‌تاک','تیک تاک','تیکتاک','tiktok'],
  telegram:['تلگرام','telegram'],
  youtube:['یوتیوب','youtube'],
  facebook:['فیسبوک','فیس‌بوک','facebook']
};
function inferPlatform(post){
  var text=((post.title||'')+' '+(post.excerpt||'')).toLowerCase();
  for(var p in PLATFORM_KEYWORDS){
    var kws=PLATFORM_KEYWORDS[p];
    for(var i=0;i<kws.length;i++){
      if(text.indexOf(kws[i].toLowerCase())>-1) return p;
    }
  }
  return null;
}
function platformIconHtml(post,sizeClass){
  var platform=(post.platform||'').toLowerCase();
  var hasIcon=['instagram','tiktok','telegram','youtube','facebook'].indexOf(platform)>-1;
  if(!hasIcon){
    // Older posts saved before the platform field existed — guess from the title/excerpt text
    var guessed=inferPlatform(post);
    if(guessed){ platform=guessed; hasIcon=true; }
  }
  var bg=PLATFORM_COLORS[hasIcon?platform:'other'];
  if(!hasIcon){
    return '<div class="'+sizeClass+'" style="background:'+bg+';font-size:'+(sizeClass==='hd-icon'?'26px':'18px')+'">'+(post.emoji||'📝')+'</div>';
  }
  var iconSize=sizeClass==='hd-icon'?28:20;
  return '<div class="'+sizeClass+'" style="background:'+bg+'"><svg width="'+iconSize+'" height="'+iconSize+'"><use href="#ico-'+platform+'"/></svg></div>';
}

function freeLikesBannerHtml(){
  return '<div class="cta-band" style="margin-bottom:30px;background:linear-gradient(135deg,rgba(0,210,160,.15),rgba(124,92,252,.12));border-color:rgba(0,210,160,.3)">'
    +'<div class="gift-emoji" style="font-size:38px;margin-bottom:8px">🎁</div>'
    +'<div style="font-size:19px;font-weight:800;color:#fff;margin-bottom:6px">🎁 دوستانت را دعوت کن و صد لایک رایگان بگیر</div>'
    +'<div style="font-size:13px;color:var(--mt);margin-bottom:16px">اینستاگرام یا تیک‌تاک — کاملاً رایگان</div>'
    +'<a class="btn btn-p" href="/auth.html">ثبت‌نام رایگان</a>'
    +'</div>';
}

function getBlogPosts(){
  try{var d=localStorage.getItem('smm_blog');if(d)return JSON.parse(d);}catch(e){}
  return [];
}

function fmtDate(iso){
  try{return new Date(iso).toLocaleDateString('fa-IR',{year:'numeric',month:'long',day:'numeric'});}
  catch(e){return '';}
}

function renderList(posts){
  var published=posts.filter(function(p){return p.published;})
    .sort(function(a,b){return new Date(b.createdAt||0)-new Date(a.createdAt||0);});

  var html='<h1 class="pg">📝 وبلاگ افغان فالوورز</h1>'
    +'<div class="sub">راهنما و نکات رشد واقعی شبکه‌های اجتماعی — اینستاگرام، تیک‌تاک، تلگرام و یوتیوب</div>'
    +freeLikesBannerHtml();

  if(!published.length){
    html+='<div class="empty"><div class="ic">📝</div>هنوز مقاله‌ای منتشر نشده — به‌زودی برمی‌گردیم!</div>';
  } else {
    html+='<div class="grid">'+published.map(function(p){
      return '<a class="post-card" href="/blog.html?post='+encodeURIComponent(p.slug)+'">'
        +platformIconHtml(p,'post-icon')
        +'<div class="post-title">'+escHtml(p.title)+'</div>'
        +'<div class="post-excerpt">'+escHtml(p.excerpt||'')+'</div>'
        +'<div class="post-date">'+fmtDate(p.createdAt)+'</div>'
        +'</a>';
    }).join('')+'</div>';
  }
  document.getElementById('main-content').innerHTML=html;
}

function renderPost(post, posts){
  document.getElementById('pg-title').textContent=post.title+' — وبلاگ افغان فالوورز';
  document.getElementById('pg-desc').setAttribute('content', post.excerpt||post.title);
  document.getElementById('og-title').setAttribute('content', post.title);
  document.getElementById('og-desc').setAttribute('content', post.excerpt||post.title);
  document.getElementById('tw-title').setAttribute('content', post.title);
  document.getElementById('tw-desc').setAttribute('content', post.excerpt||post.title);
  var url='https://afghanfollowers.online/blog.html?post='+encodeURIComponent(post.slug);
  document.getElementById('pg-canonical').setAttribute('href', url);
  document.getElementById('og-url').setAttribute('content', url);
  document.getElementById('ld-json').textContent=JSON.stringify({
    '@context':'https://schema.org',
    '@type':'BlogPosting',
    headline:post.title,
    description:post.excerpt||'',
    datePublished:post.createdAt||'',
    author:{'@type':'Organization',name:'Afghan Followers'},
    publisher:{'@type':'Organization',name:'Afghan Followers'},
    mainEntityOfPage:url
  });

  var others=posts.filter(function(p){return p.published&&p.slug!==post.slug;}).slice(0,3);

  var html='<a class="back-link" href="/blog.html">→ بازگشت به وبلاگ</a>'
    +freeLikesBannerHtml()
    +'<article class="post-detail">'
    +platformIconHtml(post,'hd-icon')
    +'<h1>'+escHtml(post.title)+'</h1>'
    +'<div class="meta">'+fmtDate(post.createdAt)+' · افغان فالوورز</div>'
    +'<div class="post-body">'+post.content+'</div>'
    +'</article>'
    +'<div class="cta-band">'
    +'<div style="font-size:18px;font-weight:800;color:#fff;margin-bottom:8px">آماده‌اید فالوور واقعی بخرید؟</div>'
    +'<a class="btn btn-p" href="/auth.html">🚀 ثبت‌نام رایگان / ورود</a>'
    +'</div>';

  if(others.length){
    html+='<div style="margin-top:36px"><div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:14px">مقالات دیگر</div><div class="grid">'
      +others.map(function(p){
        return '<a class="post-card" href="/blog.html?post='+encodeURIComponent(p.slug)+'">'
          +platformIconHtml(p,'post-icon')
          +'<div class="post-title">'+escHtml(p.title)+'</div>'
          +'<div class="post-excerpt">'+escHtml(p.excerpt||'')+'</div>'
          +'</a>';
      }).join('')+'</div></div>';
  }

  document.getElementById('main-content').innerHTML=html;
}

function render(){
  var posts=getBlogPosts();
  var params=new URLSearchParams(window.location.search);
  var slug=params.get('post');
  if(slug){
    var post=posts.find(function(p){return p.slug===slug&&p.published;});
    if(post){ renderPost(post, posts); return; }
    document.getElementById('main-content').innerHTML='<a class="back-link" href="/blog.html">→ بازگشت به وبلاگ</a><div class="empty"><div class="ic">🔍</div>این مقاله پیدا نشد.</div>';
    return;
  }
  renderList(posts);
}

// Pull fresh posts from the server, then render (works even on a brand-new
// browser that never had smm_blog cached locally).
fetch('/api/db',{method:'GET'})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d&&d.smm_blog&&Array.isArray(d.smm_blog)){
      localStorage.setItem('smm_blog',JSON.stringify(d.smm_blog));
    }
  })
  .catch(function(){})
  .then(render);
document.getElementById('y').textContent=new Date().getFullYear();

// Notify admin via Telegram on each new visitor — deduped to once per
// browser per day (shared localStorage key across index/blog/auth.html)
// so a page refresh or clicking between pages doesn't spam the bot.
(function(){
  try{
    var KEY='smm_visit_notified_date';
    var today=new Date().toDateString();
    if(localStorage.getItem(KEY)===today) return;
    localStorage.setItem(KEY,today);
    var msg='👀 <b>بازدید جدید از سایت</b>\n\n'
      +'📄 صفحه: '+location.pathname+'\n'
      +'🔗 ارجاع: '+(document.referrer||'مستقیم')+'\n'
      +'📱 دستگاه: '+navigator.userAgent.slice(0,90);
    var payload=JSON.stringify({message:msg});
    if(navigator.sendBeacon){
      navigator.sendBeacon('/api/notify-telegram', new Blob([payload],{type:'application/json'}));
    } else {
      fetch('/api/notify-telegram',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:payload,
        keepalive:true
      }).catch(function(){});
    }
  }catch(e){}
})();
</script>

<script>
(function(){

    var username=(tgBot.username||'').replace('@','').trim();

      if(fab) fab.href='https://t.me/'+username;

// ── Floating AI Assistant widget ──
var _aiWidgetHistory=[];
function toggleAiWidget(){
  var w=document.getElementById('ai-widget');
  if(!w) return;
  var open=w.style.display==='flex';
  w.style.display=open?'none':'flex';
  if(!open){
    var input=document.getElementById('ai-widget-input');
    if(input) input.focus();
  }
}
function sendAiWidgetChat(){
  var input=document.getElementById('ai-widget-input');
  var log=document.getElementById('ai-widget-log');
  if(!input||!log) return;
  var msg=input.value.trim();
  if(!msg) return;
  input.value='';
  input.disabled=true;

  var userBubble=document.createElement('div');
  userBubble.style.cssText='background:#7c5cfc;color:#fff;border-radius:10px;padding:10px 12px;font-size:13px;align-self:flex-end;max-width:85%';
  userBubble.textContent=msg;
  log.appendChild(userBubble);

  var typingBubble=document.createElement('div');
  typingBubble.style.cssText='background:#161b28;border-radius:10px;padding:10px 12px;font-size:13px;color:#8a93a6;align-self:flex-start;max-width:85%';
  typingBubble.textContent='در حال تایپ...';
  log.appendChild(typingBubble);
  log.scrollTop=log.scrollHeight;

  fetch('/api/ai-chat',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:msg,history:_aiWidgetHistory})
  }).then(function(r){return r.json();}).then(function(d){
    input.disabled=false;
    input.focus();
    typingBubble.remove();
    var botBubble=document.createElement('div');
    botBubble.style.cssText='background:#161b28;border-radius:10px;padding:10px 12px;font-size:13px;color:#e2e8f0;align-self:flex-start;max-width:85%;white-space:pre-wrap';
    if(d.ok&&d.reply){
      botBubble.textContent=d.reply;
      _aiWidgetHistory.push({role:'user',content:msg});
      _aiWidgetHistory.push({role:'assistant',content:d.reply});
    }else{
      botBubble.textContent='متأسفانه الان نمی‌تونم جواب بدم. لطفاً از دکمه‌ی تلگرام پیام بدید.';
    }
    log.appendChild(botBubble);
    log.scrollTop=log.scrollHeight;
  }).catch(function(){
    input.disabled=false;
    typingBubble.remove();
    var errBubble=document.createElement('div');
    errBubble.style.cssText='background:#161b28;border-radius:10px;padding:10px 12px;font-size:13px;color:#ff5c7d;align-self:flex-start;max-width:85%';
    errBubble.textContent='خطا در اتصال. لطفاً دوباره امتحان کنید.';
    log.appendChild(errBubble);
  });
}
</script>
