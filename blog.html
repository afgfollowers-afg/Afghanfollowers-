<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pg-title">وبلاگ افغان فالوورز | Afghan Followers Blog</title>
<meta name="description" id="pg-desc" content="مقالات و راهنمای رشد شبکه‌های اجتماعی — اینستاگرام، تیک‌تاک، تلگرام و یوتیوب. نکات افزایش فالوور، لایک و بازدید واقعی.">
<link rel="canonical" id="pg-canonical" href="https://afghanfollowers.online/blog.html">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" id="og-title" content="وبلاگ افغان فالوورز">
<meta property="og:description" id="og-desc" content="مقالات و راهنمای رشد شبکه‌های اجتماعی">
<meta property="og:url" id="og-url" content="https://afghanfollowers.online/blog.html">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c5cfc">
<link rel="icon" href="/icons/favicon-32.png">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script type="application/ld+json" id="ld-json">{"@context":"https://schema.org","@type":"Blog","name":"Afghan Followers Blog","url":"https://afghanfollowers.online/blog.html"}</script>
<style>
:root{--bg:#08090d;--s1:#10131c;--s2:#161b28;--bd:#232a3d;--acc:#7c5cfc;--acc2:#a78bfa;--gr:#00d2a0;--tx:#e2e8f0;--mt:#8a93a6;--wh:#fff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:'Vazirmatn',sans-serif;line-height:1.9;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(124,92,252,.15),transparent 60%),radial-gradient(ellipse at 85% 30%,rgba(0,210,160,.1),transparent 60%);pointer-events:none;z-index:0;}
.wrap{max-width:820px;margin:0 auto;padding:24px 20px 60px;position:relative;z-index:1;}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:36px;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;color:var(--wh);text-decoration:none;}
.logo-ic{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--acc),var(--gr));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#fff;flex-shrink:0;}
.nav-cta{display:flex;gap:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-weight:700;font-size:13px;text-decoration:none;border:1px solid transparent;}
.btn-p{background:linear-gradient(135deg,var(--acc),#5b21b6);color:#fff;}
.btn-g{background:var(--s2);border-color:var(--bd);color:var(--tx);}
h1.pg{font-size:clamp(24px,4.5vw,34px);font-weight:900;color:var(--wh);margin-bottom:8px;}
.sub{color:var(--mt);font-size:14px;margin-bottom:34px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
.post-card{display:block;background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:20px;text-decoration:none;color:inherit;transition:border-color .2s,transform .2s;}
.post-card:hover{border-color:var(--acc);transform:translateY(-2px);}
.post-emoji{font-size:26px;margin-bottom:10px;}
.post-title{font-size:15px;font-weight:800;color:var(--wh);margin-bottom:6px;}
.post-excerpt{font-size:12.5px;color:var(--mt);margin-bottom:10px;}
.post-date{font-size:11px;color:var(--acc2);}
.empty{text-align:center;padding:60px 20px;color:var(--mt);}
.empty .ic{font-size:40px;margin-bottom:12px;}
/* Post detail */
.post-detail{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:30px 26px;}
.post-detail .hd-emoji{font-size:40px;margin-bottom:14px;}
.post-detail h1{font-size:clamp(22px,4vw,30px);font-weight:900;color:var(--wh);margin-bottom:10px;}
.post-detail .meta{font-size:12px;color:var(--acc2);margin-bottom:22px;}
.post-body{font-size:15px;color:var(--tx);}
.post-body p{margin-bottom:14px;}
.post-body h2{font-size:19px;font-weight:800;color:var(--wh);margin:22px 0 10px;}
.post-body h3{font-size:16px;font-weight:800;color:var(--wh);margin:18px 0 8px;}
.post-body ul,.post-body ol{margin:0 0 14px 0;padding-inline-start:22px;}
.post-body a{color:var(--acc2);}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--acc2);text-decoration:none;font-size:13px;font-weight:700;margin-bottom:20px;}
.cta-band{text-align:center;background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(0,210,160,.1));border:1px solid rgba(124,92,252,.25);border-radius:16px;padding:30px 20px;margin-top:30px;}
footer{border-top:1px solid var(--bd);margin-top:50px;padding-top:22px;text-align:center;color:var(--mt);font-size:12px;}
footer a{color:var(--acc2);text-decoration:none;}
@media(max-width:560px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <a class="logo" href="/"><span class="logo-ic">AF</span> Afghan Followers</a>
  <nav class="nav-cta">
    <a class="btn btn-g" href="/">🏠 خانه</a>
    <a class="btn btn-p" href="/auth.html">ورود / ثبت‌نام</a>
  </nav>
</header>

<main id="main-content">
  <div class="empty"><div class="ic">⏳</div>در حال بارگذاری...</div>
</main>

<footer>
  © <span id="y"></span> Afghan Followers · <a href="/">خانه</a> · <a href="/auth.html">ورود / ثبت‌نام</a>
</footer>

</div>

<script>
function escHtml(s){var d=document.createElement('div');d.textContent=String(s==null?'':s);return d.innerHTML;}

function getBlogPosts(){
  try{var d=localStorage.getItem('smm_blog');if(d)return JSON.parse(d);}catch(e){}
  return [];
}

function fmtDate(iso){
  try{return new Date(iso).toLocaleDateString('fa-IR',{year:'numeric',month:'long',day:'numeric'});}
  catch(e){return '';}
}

function renderList(posts){
  var published=posts.filter(function(p){return p.published;})
    .sort(function(a,b){return new Date(b.createdAt||0)-new Date(a.createdAt||0);});

  var html='<h1 class="pg">📝 وبلاگ افغان فالوورز</h1>'
    +'<div class="sub">راهنما و نکات رشد واقعی شبکه‌های اجتماعی — اینستاگرام، تیک‌تاک، تلگرام و یوتیوب</div>';

  if(!published.length){
    html+='<div class="empty"><div class="ic">📝</div>هنوز مقاله‌ای منتشر نشده — به‌زودی برمی‌گردیم!</div>';
  } else {
    html+='<div class="grid">'+published.map(function(p){
      return '<a class="post-card" href="/blog.html?post='+encodeURIComponent(p.slug)+'">'
        +'<div class="post-emoji">'+(p.emoji||'📝')+'</div>'
        +'<div class="post-title">'+escHtml(p.title)+'</div>'
        +'<div class="post-excerpt">'+escHtml(p.excerpt||'')+'</div>'
        +'<div class="post-date">'+fmtDate(p.createdAt)+'</div>'
        +'</a>';
    }).join('')+'</div>';
  }
  document.getElementById('main-content').innerHTML=html;
}

function renderPost(post, posts){
  document.getElementById('pg-title').textContent=post.title+' — وبلاگ افغان فالوورز';
  document.getElementById('pg-desc').setAttribute('content', post.excerpt||post.title);
  document.getElementById('og-title').setAttribute('content', post.title);
  document.getElementById('og-desc').setAttribute('content', post.excerpt||post.title);
  var url='https://afghanfollowers.online/blog.html?post='+encodeURIComponent(post.slug);
  document.getElementById('pg-canonical').setAttribute('href', url);
  document.getElementById('og-url').setAttribute('content', url);
  document.getElementById('ld-json').textContent=JSON.stringify({
    '@context':'https://schema.org',
    '@type':'BlogPosting',
    headline:post.title,
    description:post.excerpt||'',
    datePublished:post.createdAt||'',
    author:{'@type':'Organization',name:'Afghan Followers'},
    publisher:{'@type':'Organization',name:'Afghan Followers'},
    mainEntityOfPage:url
  });

  var others=posts.filter(function(p){return p.published&&p.slug!==post.slug;}).slice(0,3);

  var html='<a class="back-link" href="/blog.html">→ بازگشت به وبلاگ</a>'
    +'<article class="post-detail">'
    +'<div class="hd-emoji">'+(post.emoji||'📝')+'</div>'
    +'<h1>'+escHtml(post.title)+'</h1>'
    +'<div class="meta">'+fmtDate(post.createdAt)+' · افغان فالوورز</div>'
    +'<div class="post-body">'+post.content+'</div>'
    +'</article>'
    +'<div class="cta-band">'
    +'<div style="font-size:18px;font-weight:800;color:#fff;margin-bottom:8px">آماده‌اید فالوور واقعی بخرید؟</div>'
    +'<a class="btn btn-p" href="/auth.html">🚀 ثبت‌نام رایگان / ورود</a>'
    +'</div>';

  if(others.length){
    html+='<div style="margin-top:36px"><div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:14px">مقالات دیگر</div><div class="grid">'
      +others.map(function(p){
        return '<a class="post-card" href="/blog.html?post='+encodeURIComponent(p.slug)+'">'
          +'<div class="post-emoji">'+(p.emoji||'📝')+'</div>'
          +'<div class="post-title">'+escHtml(p.title)+'</div>'
          +'<div class="post-excerpt">'+escHtml(p.excerpt||'')+'</div>'
          +'</a>';
      }).join('')+'</div></div>';
  }

  document.getElementById('main-content').innerHTML=html;
}

function render(){
  var posts=getBlogPosts();
  var params=new URLSearchParams(window.location.search);
  var slug=params.get('post');
  if(slug){
    var post=posts.find(function(p){return p.slug===slug&&p.published;});
    if(post){ renderPost(post, posts); return; }
    document.getElementById('main-content').innerHTML='<a class="back-link" href="/blog.html">→ بازگشت به وبلاگ</a><div class="empty"><div class="ic">🔍</div>این مقاله پیدا نشد.</div>';
    return;
  }
  renderList(posts);
}

// Pull fresh posts from the server, then render (works even on a brand-new
// browser that never had smm_blog cached locally).
fetch('/api/db',{method:'GET'})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d&&d.smm_blog&&Array.isArray(d.smm_blog)){
      localStorage.setItem('smm_blog',JSON.stringify(d.smm_blog));
    }
  })
  .catch(function(){})
  .then(render);
document.getElementById('y').textContent=new Date().getFullYear();
</script>
</body>
</html>
